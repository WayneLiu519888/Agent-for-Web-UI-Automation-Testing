browser:
  headless: true
  viewport: { width: 1920, height: 1080 }
explorer:
  mode: "quick"
  max_depth: 2
  max_pages: 50
  filter_exclude:
    - "logout"
    - "/api/"
executor:
  plan_mode: "sprint"
  llm_max_concurrency: 4
  batch_size: 10
  plan_timeout_ms: 60000
  retry: 1
  action_timeout: 10000
  navigation_timeout: 30000
  expect_timeout: 5000
  trace_on_failure: true
  per_worker_request_delay_ms: 100
report:
  include_screenshots: true
  include_traces: false
logging:
  level: "info"
  file: "logs/mcp-server.log"
  max_size: "10MB"
  max_files: 5

# HTTP 传输安全：IP 白名单
ip_whitelist:
  - "127.0.0.1"
  - "::1"
